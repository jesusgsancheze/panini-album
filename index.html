<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b3d2e">
<title>Panini 2026 — My Album</title>
<style>
  :root {
    --bg: #0b3d2e;
    --bg-2: #0f5239;
    --panel: #103e30;
    --panel-2: #154a3a;
    --gold: #f1c40f;
    --gold-dim: #b08c0a;
    --text: #f4f1e8;
    --muted: #9bb6a8;
    --good: #2ecc71;
    --bad: #e74c3c;
    --line: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header {
    background: linear-gradient(135deg, var(--bg-2), var(--bg));
    border-bottom: 1px solid var(--line);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; flex: 0 0 auto; letter-spacing: 0.3px; }
  header h1 .accent { color: var(--gold); }
  .progress-block { flex: 1 1 auto; min-width: 200px; }
  .progress-label { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }
  .progress-bar { height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); transition: width .3s; }

  .header-actions { display: flex; gap: 8px; align-items: center; flex: 0 0 auto; }
  .sync-status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .sync-dot.synced { background: var(--good); }
  .sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--bad); }
  .sync-dot.offline { background: var(--muted); }
  @keyframes pulse { 50% { opacity: 0.4; } }

  button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: var(--panel); }
  button.primary { background: var(--gold); color: #1a1a1a; border-color: var(--gold); font-weight: 600; }
  button.primary:hover { background: #f4d03f; }
  button.icon { padding: 6px 8px; }

  main { display: flex; flex: 1; overflow: hidden; }

  aside {
    width: 260px; background: var(--panel); border-right: 1px solid var(--line);
    overflow-y: auto; flex-shrink: 0;
  }
  .filter-box { padding: 10px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--panel); z-index: 1; }
  .filter-box input {
    width: 100%; background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    padding: 8px 10px; border-radius: 6px; font-size: 13px;
  }
  .sort-toggle { display: flex; gap: 4px; margin-top: 8px; background: var(--bg); padding: 3px; border-radius: 6px; }
  .sort-toggle button {
    flex: 1; padding: 5px 8px; font-size: 11px;
    background: transparent; color: var(--muted); border: none; border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .sort-toggle button.active { background: var(--gold); color: #1a1a1a; font-weight: 600; }
  .group-header {
    padding: 8px 12px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--muted); font-weight: 600;
  }
  .section-item {
    padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    border-left: 3px solid transparent; gap: 8px;
  }
  .section-item:hover { background: var(--panel-2); }
  .section-item.active { background: var(--panel-2); border-left-color: var(--gold); }
  .section-item .name { display: flex; align-items: center; gap: 8px; font-size: 13px; flex: 1; min-width: 0; }
  .section-item .name span.txt { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .section-item .count {
    font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums;
    flex: 0 0 auto;
  }
  .section-item.complete .count { color: var(--good); font-weight: 600; }

  section.content { flex: 1; overflow-y: auto; padding: 16px; }
  .section-title { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .section-title h2 { margin: 0; font-size: 22px; }
  .section-title .meta { color: var(--muted); font-size: 13px; }
  .section-toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .section-toolbar .toggle {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);
    background: var(--panel-2); padding: 4px 10px; border-radius: 6px; cursor: pointer;
  }
  .section-toolbar .toggle input { accent-color: var(--gold); }

  .grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  }
  .sticker {
    background: var(--panel); border: 2px solid var(--line); border-radius: 10px;
    padding: 10px; display: flex; flex-direction: column; gap: 8px; transition: all .15s;
    position: relative;
  }
  .sticker.owned { border-color: var(--gold); background: linear-gradient(135deg, var(--panel), var(--panel-2)); }
  .sticker .num {
    font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sticker.owned .num { color: var(--gold); }
  .sticker .label {
    font-size: 13px; line-height: 1.25; min-height: 32px; cursor: pointer;
    display: flex; align-items: center;
  }
  .sticker .actions { display: flex; align-items: center; gap: 6px; justify-content: space-between; }
  .sticker .own-btn {
    flex: 1; background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    padding: 5px 8px; font-size: 12px; border-radius: 5px; cursor: pointer;
  }
  .sticker.owned .own-btn { background: var(--gold); color: #1a1a1a; border-color: var(--gold); font-weight: 600; }
  .dup-control { display: none; align-items: center; gap: 4px; }
  .sticker.owned .dup-control { display: flex; }
  .dup-control button {
    width: 24px; height: 24px; padding: 0; border-radius: 50%; font-size: 14px;
    line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .dup-control .count {
    min-width: 18px; text-align: center; font-size: 12px; font-variant-numeric: tabular-nums;
    color: var(--muted);
  }
  .dup-control .count.has-dups { color: var(--gold); font-weight: 600; }

  /* Stats view */
  .stats { display: flex; flex-direction: column; gap: 28px; }
  .stats-section h3 {
    margin: 0 0 10px; font-size: 16px;
    display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap;
  }
  .stats-section h3 .meta { font-size: 12px; color: var(--muted); font-weight: normal; }
  .stats-empty { color: var(--muted); font-size: 13px; margin: 4px 0; }
  .missing-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .missing-item {
    background: var(--panel); border: 1px solid var(--line); padding: 6px 10px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
    display: inline-flex; gap: 6px; align-items: center; color: var(--text);
  }
  .missing-item:hover { background: var(--panel-2); border-color: var(--gold); }
  .progress-list { display: flex; flex-direction: column; gap: 6px; }
  .progress-row {
    display: grid; grid-template-columns: minmax(120px, 1fr) 2fr auto; gap: 12px; align-items: center;
    background: var(--panel); padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--line); cursor: pointer;
  }
  .progress-row:hover { border-color: var(--gold); }
  .progress-row .label {
    font-size: 13px; display: flex; gap: 6px; align-items: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .progress-row .bar { height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden; }
  .progress-row .fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
  .progress-row .pct { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 90px; text-align: right; white-space: nowrap; }
  .progress-row.complete { border-color: rgba(46, 204, 113, 0.4); }
  .progress-row.complete .pct { color: var(--good); }
  .progress-row.complete .fill { background: var(--good); }
  @media (max-width: 700px) {
    .progress-row { grid-template-columns: 1fr auto; gap: 8px; }
    .progress-row .bar { grid-column: 1 / -1; order: 99; }
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 16px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { margin: 0 0 12px; }
  .modal p { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 8px 0; }
  .modal label { display: block; font-size: 13px; margin: 12px 0 4px; }
  .modal input[type="text"] {
    width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: monospace;
  }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
  .modal ol { padding-left: 20px; font-size: 13px; line-height: 1.7; color: var(--muted); }
  .modal ol code { background: var(--panel-2); padding: 1px 5px; border-radius: 3px; color: var(--text); font-size: 12px; }
  .modal a { color: var(--gold); }
  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--line); padding: 10px 16px;
    border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0;
    transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--bad); }

  /* Mobile */
  .menu-btn { display: none; }
  @media (max-width: 700px) {
    aside { position: fixed; left: -260px; top: 0; bottom: 0; z-index: 50; transition: left .25s; height: 100%; }
    aside.open { left: 0; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .menu-btn { display: inline-block; }
    header h1 { font-size: 14px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
    .progress-block { order: 99; flex-basis: 100%; }
  }
</style>
</head>
<body>
<header>
  <button class="menu-btn icon" id="menuBtn" data-i18n-aria="sectionsAria" aria-label="Sections">☰</button>
  <h1>Panini <span class="accent">2026</span> — <span data-i18n="myAlbum">My Album</span></h1>
  <div class="progress-block">
    <div class="progress-label">
      <span id="progressText">0 / 980 stickers</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="header-actions">
    <div class="sync-status" id="syncStatus" data-i18n-title="clickToSync" title="Click to sync now">
      <span class="sync-dot offline" id="syncDot"></span>
      <span id="syncText">Offline</span>
    </div>
    <button id="langBtn" title="Language / Idioma">EN</button>
    <button id="setupBtn" data-i18n-title="dropboxSetup" title="Dropbox setup">⚙</button>
  </div>
</header>

<main>
  <aside id="sidebar">
    <div class="filter-box">
      <input id="filter" type="search" data-i18n-placeholder="filterPlaceholder" placeholder="Filter sections…" />
      <div class="sort-toggle" id="sortToggle">
        <button data-sort="confederation" data-i18n="confederation">Confederation</button>
        <button data-sort="group" data-i18n="wcGroup">World Cup group</button>
      </div>
    </div>
    <div id="sections"></div>
  </aside>
  <section class="content" id="content"></section>
</main>

<div class="modal-backdrop" id="setupModal">
  <div class="modal">
    <h2 data-i18n="modalTitle">Dropbox Sync</h2>
    <p id="setupStatus"></p>
    <div id="setupForm">
      <div id="setupShared" style="display:none">
        <p data-i18n-html="sharedIntro"></p>
      </div>
      <div id="setupAdvanced">
        <p data-i18n="advancedIntro"></p>
        <ol>
          <li data-i18n-html="step1"></li>
          <li data-i18n-html="step2"></li>
          <li data-i18n-html="step3"></li>
          <li data-i18n-html="step4"></li>
          <li data-i18n-html="step5"></li>
          <li data-i18n-html="step6"></li>
          <li data-i18n-html="step7"></li>
        </ol>
        <label data-i18n="appKey">App key</label>
        <input type="text" id="appKeyInput" placeholder="abcdef1234567" />
      </div>
      <div class="actions">
        <button id="closeSetup" data-i18n="cancel">Cancel</button>
        <button id="connectBtn" class="primary" data-i18n="connectDbx">Connect Dropbox</button>
      </div>
    </div>
    <div id="connectedView" style="display:none">
      <p data-i18n="connectedShort">✓ Connected to Dropbox.</p>
      <p data-i18n-html="albumFile"></p>
      <div class="actions">
        <button id="syncNowBtn" data-i18n="syncNow">Sync now</button>
        <button id="exportBtn" data-i18n="exportJson">Export JSON</button>
        <button id="disconnectBtn" data-i18n="disconnect">Disconnect</button>
        <button id="closeSetup2" class="primary" data-i18n="done">Done</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let lang = localStorage.getItem("panini.lang");
if (!I18N[lang]) lang = (navigator.language || "en").toLowerCase().startsWith("es") ? "es" : "en";

function t(key, ...args) {
  const v = (I18N[lang] && I18N[lang][key]);
  const fallback = I18N.en[key];
  const value = v != null ? v : fallback;
  if (value == null) return key;
  return typeof value === "function" ? value(...args) : value;
}

// Build sections.
// Per-team layout (within team's 20-sticker block):
//   pos 1  → Crest
//   pos 2-12 → Players 1-11
//   pos 13 → Team Photo
//   pos 14-20 → Players 12-18
const SECTIONS = [];
SECTIONS.push({
  id: "intro",
  nameKey: "intro",
  group: "Special",
  flag: "⚽",
  stickers: INTRO_LABEL_KEYS.map(([k, ...args], i) => ({ n: i, labelKey: k, labelArgs: args }))
});
TEAMS.forEach((tm, idx) => {
  const start = 20 + idx * 20;
  const code = tm[3];
  const stickers = [];
  stickers.push({ n: start, labelKey: "teamCrest" });
  for (let p = 2; p <= 12; p++) stickers.push({ n: start + p - 1, label: `${code} ${p}` });
  stickers.push({ n: start + 12, labelKey: "teamPhoto" });
  for (let p = 14; p <= 20; p++) stickers.push({ n: start + p - 1, label: `${code} ${p}` });
  const wc = WC_GROUPS[tm[0]] || ["?", 99];
  SECTIONS.push({
    id: "team-" + idx,
    name: tm[0],
    group: tm[2],
    wcGroup: wc[0],
    wcPos: wc[1],
    flag: tm[1],
    stickers
  });
});

function sectionName(sec) { return sec.nameKey ? t(sec.nameKey) : sec.name; }

const TOTAL_STICKERS = 980;

// ---------------- State ----------------
const STORAGE_KEY = "panini2026.v1";
const DBX_KEY = "panini2026.dbx";

const defaultState = () => ({
  version: 1,
  lastUpdated: 0,
  owned: {},      // { "23": true }
  duplicates: {}  // { "23": 2 } meaning 2 EXTRAS beyond the first
});

let state = loadState();
let activeSectionId = "intro";
let hideOwned = false;
let sortMode = localStorage.getItem("panini.sort") || "confederation";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  } catch { return defaultState(); }
}

function saveState() {
  state.lastUpdated = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  scheduleSync();
}

function ownedCount() { return Object.keys(state.owned).filter(k => state.owned[k]).length; }
function dupsFor(n) { return state.duplicates[n] || 0; }
function isOwned(n) { return !!state.owned[n]; }

function setOwned(n, v) {
  if (v) state.owned[n] = true; else { delete state.owned[n]; delete state.duplicates[n]; }
  saveState();
}
function setDups(n, v) {
  v = Math.max(0, v|0);
  if (v === 0) delete state.duplicates[n]; else state.duplicates[n] = v;
  saveState();
}

// ---------------- Render ----------------
const $ = (id) => document.getElementById(id);

function sectionStats(sec) {
  let owned = 0, dups = 0;
  sec.stickers.forEach(s => {
    if (isOwned(s.n)) owned++;
    dups += dupsFor(s.n);
  });
  return { owned, total: sec.stickers.length, dups };
}

function renderSidebar() {
  const filter = ($("filter").value || "").toLowerCase();
  const byGroup = sortMode === "group";
  const groups = {};
  SECTIONS.forEach(sec => {
    const groupVal = byGroup ? (sec.wcGroup || "Special") : sec.group;
    const localName = sectionName(sec).toLowerCase();
    if (filter && !localName.includes(filter) && !groupVal.toLowerCase().includes(filter)) return;
    (groups[groupVal] ||= []).push(sec);
  });
  const order = byGroup
    ? ["Special","A","B","C","D","E","F","G","H","I","J","K","L"]
    : ["Special","Host","UEFA","CONMEBOL","CONCACAF","CAF","AFC","OFC"];
  $("sortToggle").querySelectorAll("button").forEach(b => {
    b.classList.toggle("active", b.dataset.sort === sortMode);
  });
  if (byGroup) {
    Object.values(groups).forEach(arr => arr.sort((a, b) => (a.wcPos || 99) - (b.wcPos || 99)));
  }
  const headerFor = (g) => {
    if (byGroup) return g === "Special" ? t("special") : `${t("group")} ${g}`;
    if (g === "Special") return t("special");
    if (g === "Host") return t("host");
    return g; // confederation acronyms (UEFA, CAF, ...) stay as-is
  };
  let html = "";
  html += `<div class="group-header">${t("overview")}</div>`;
  html += `<div class="section-item ${activeSectionId === 'stats' ? 'active' : ''}" data-id="stats">
    <div class="name"><span>📊</span><span class="txt">${t("stats")}</span></div>
    <div class="count"></div>
  </div>`;
  order.forEach(g => {
    if (!groups[g]) return;
    html += `<div class="group-header">${headerFor(g)}</div>`;
    groups[g].forEach(sec => {
      const st = sectionStats(sec);
      const complete = st.owned === st.total;
      const dupBadge = st.dups > 0 ? ` <span style="color:var(--gold)">+${st.dups}</span>` : "";
      html += `<div class="section-item ${activeSectionId === sec.id ? 'active' : ''} ${complete ? 'complete' : ''}" data-id="${sec.id}">
        <div class="name"><span>${sec.flag}</span><span class="txt">${sectionName(sec)}</span></div>
        <div class="count">${st.owned}/${st.total}${dupBadge}</div>
      </div>`;
    });
  });
  $("sections").innerHTML = html;
  $("sections").querySelectorAll(".section-item").forEach(el => {
    el.addEventListener("click", () => {
      activeSectionId = el.dataset.id;
      renderSidebar(); renderContent();
      if (window.innerWidth <= 700) $("sidebar").classList.remove("open");
    });
  });
}

function renderContent() {
  if (activeSectionId === "stats") return renderStats();
  const sec = SECTIONS.find(s => s.id === activeSectionId);
  if (!sec) return;
  const st = sectionStats(sec);
  const metaParts = [t("collected", st.owned, st.total)];
  if (st.dups) metaParts.push(t("extras", st.dups));
  let html = `
    <div class="section-title">
      <h2>${sec.flag} ${sectionName(sec)}</h2>
      <span class="meta">${metaParts.join(" · ")}</span>
    </div>
    <div class="section-toolbar">
      <label class="toggle"><input type="checkbox" id="hideOwnedCheck" ${hideOwned ? 'checked' : ''}/> ${t("hideOwned")}</label>
      <button id="markAllBtn">${t("markComplete")}</button>
      <button id="clearAllBtn">${t("clearSection")}</button>
    </div>
    <div class="grid" id="grid">`;
  sec.stickers.forEach(s => {
    const owned = isOwned(s.n);
    if (hideOwned && owned) return;
    const dups = dupsFor(s.n);
    html += `<div class="sticker ${owned ? 'owned' : ''}" data-n="${s.n}">
      <div class="num"><span>#${s.n}</span>${owned ? '<span>✓</span>' : ''}</div>
      <div class="label">${stickerLabel(s)}</div>
      <div class="actions">
        <button class="own-btn">${owned ? t("gotIt") : t("markHave")}</button>
        <div class="dup-control">
          <button class="dup-minus" title="${t("removeDup")}">−</button>
          <span class="count ${dups > 0 ? 'has-dups' : ''}">${dups}</span>
          <button class="dup-plus" title="${t("addDup")}">+</button>
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;
  $("content").innerHTML = html;

  $("hideOwnedCheck").addEventListener("change", e => { hideOwned = e.target.checked; renderContent(); });
  $("markAllBtn").addEventListener("click", () => {
    sec.stickers.forEach(s => { if (!isOwned(s.n)) state.owned[s.n] = true; });
    saveState(); rerender();
  });
  $("clearAllBtn").addEventListener("click", () => {
    if (!confirm(t("clearConfirm"))) return;
    sec.stickers.forEach(s => { delete state.owned[s.n]; delete state.duplicates[s.n]; });
    saveState(); rerender();
  });
  $("grid").querySelectorAll(".sticker").forEach(el => {
    const n = +el.dataset.n;
    el.querySelector(".own-btn").addEventListener("click", () => { setOwned(n, !isOwned(n)); rerender(); });
    el.querySelector(".label").addEventListener("click", () => { setOwned(n, !isOwned(n)); rerender(); });
    el.querySelector(".dup-plus").addEventListener("click", e => { e.stopPropagation(); setDups(n, dupsFor(n) + 1); rerender(); });
    el.querySelector(".dup-minus").addEventListener("click", e => { e.stopPropagation(); setDups(n, dupsFor(n) - 1); rerender(); });
  });
}

function renderStats() {
  const teams = SECTIONS.filter(s => s.id.startsWith("team-"));
  // In our sticker array: index 0 = crest, index 12 = team photo.
  const missingCrests = teams.filter(s => !isOwned(s.stickers[0].n));
  const missingPhotos = teams.filter(s => !isOwned(s.stickers[12].n));

  const groupStats = {};
  teams.forEach(s => {
    const g = s.wcGroup || "?";
    (groupStats[g] ||= { owned: 0, total: 0 });
    s.stickers.forEach(st => {
      groupStats[g].total++;
      if (isOwned(st.n)) groupStats[g].owned++;
    });
  });
  const groupRows = Object.entries(groupStats)
    .map(([g, st]) => ({ key: g, label: `${t("group")} ${g}`, owned: st.owned, total: st.total, pct: st.total ? st.owned / st.total * 100 : 0 }))
    .sort((a, b) => b.pct - a.pct || a.key.localeCompare(b.key));

  const teamRows = teams.map(s => {
    const st = sectionStats(s);
    return { id: s.id, label: `${s.flag} ${sectionName(s)}`, owned: st.owned, total: st.total, pct: st.total ? st.owned / st.total * 100 : 0 };
  }).sort((a, b) => b.pct - a.pct || a.label.localeCompare(b.label));

  const itemBtn = (s) => `<button class="missing-item" data-jump="${s.id}">${s.flag} ${sectionName(s)}</button>`;
  const progressRow = (r, jumpId) =>
    `<div class="progress-row ${r.owned === r.total ? 'complete' : ''}" ${jumpId ? `data-jump="${jumpId}"` : ''}>
      <span class="label">${r.label}</span>
      <div class="bar"><div class="fill" style="width:${r.pct}%"></div></div>
      <span class="pct">${r.owned}/${r.total} · ${Math.round(r.pct)}%</span>
    </div>`;

  $("content").innerHTML = `
    <div class="section-title"><h2>${t("statsTitle")}</h2><span class="meta">${t("statsSubtitle")}</span></div>
    <div class="stats">
      <div class="stats-section">
        <h3>${t("missingCrests")} <span class="meta">${t("countOf", missingCrests.length, teams.length)}</span></h3>
        ${missingCrests.length
          ? `<div class="missing-list">${missingCrests.map(itemBtn).join('')}</div>`
          : `<p class="stats-empty">${t("allCrests")}</p>`}
      </div>
      <div class="stats-section">
        <h3>${t("missingPhotos")} <span class="meta">${t("countOf", missingPhotos.length, teams.length)}</span></h3>
        ${missingPhotos.length
          ? `<div class="missing-list">${missingPhotos.map(itemBtn).join('')}</div>`
          : `<p class="stats-empty">${t("allPhotos")}</p>`}
      </div>
      <div class="stats-section">
        <h3>${t("groupProgress")} <span class="meta">${t("mostToLeast")}</span></h3>
        <div class="progress-list">${groupRows.map(r => progressRow(r)).join('')}</div>
      </div>
      <div class="stats-section">
        <h3>${t("teamProgress")} <span class="meta">${t("mostToLeast")}</span></h3>
        <div class="progress-list">${teamRows.map(r => progressRow(r, r.id)).join('')}</div>
      </div>
    </div>`;

  $("content").querySelectorAll("[data-jump]").forEach(el => {
    el.addEventListener("click", () => {
      activeSectionId = el.dataset.jump;
      renderSidebar(); renderContent();
      $("content").scrollTop = 0;
    });
  });
}

function renderProgress() {
  const c = ownedCount();
  const pct = Math.round((c / TOTAL_STICKERS) * 100);
  $("progressText").textContent = t("stickerCount", c, TOTAL_STICKERS);
  $("progressPct").textContent = pct + "%";
  $("progressFill").style.width = pct + "%";
}

function rerender() { renderSidebar(); renderContent(); renderProgress(); }

// ---------------- Dropbox OAuth (PKCE) ----------------
const DBX_REDIRECT = location.origin + location.pathname;

function dbxState() {
  try { return JSON.parse(localStorage.getItem(DBX_KEY) || "{}"); } catch { return {}; }
}
function setDbxState(s) { localStorage.setItem(DBX_KEY, JSON.stringify(s)); }

async function sha256(buf) {
  const data = new TextEncoder().encode(buf);
  const h = await crypto.subtle.digest("SHA-256", data);
  return btoa(String.fromCharCode(...new Uint8Array(h)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function randomString(len = 64) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => chars[b % chars.length]).join("");
}

async function startDropboxOAuth(appKey) {
  const verifier = randomString(64);
  const challenge = await sha256(verifier);
  const s = dbxState();
  s.appKey = appKey;
  s.verifier = verifier;
  setDbxState(s);
  const url = new URL("https://www.dropbox.com/oauth2/authorize");
  url.searchParams.set("client_id", appKey);
  url.searchParams.set("response_type", "code");
  url.searchParams.set("code_challenge", challenge);
  url.searchParams.set("code_challenge_method", "S256");
  url.searchParams.set("token_access_type", "offline");
  url.searchParams.set("redirect_uri", DBX_REDIRECT);
  location.href = url.toString();
}

async function exchangeCode(code) {
  const s = dbxState();
  if (!s.appKey || !s.verifier) throw new Error("Missing OAuth state");
  const body = new URLSearchParams({
    code, grant_type: "authorization_code", client_id: s.appKey,
    code_verifier: s.verifier, redirect_uri: DBX_REDIRECT
  });
  const r = await fetch("https://api.dropboxapi.com/oauth2/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body
  });
  if (!r.ok) throw new Error("Token exchange failed: " + await r.text());
  const tok = await r.json();
  s.accessToken = tok.access_token;
  s.refreshToken = tok.refresh_token;
  s.expiresAt = Date.now() + (tok.expires_in - 60) * 1000;
  delete s.verifier;
  setDbxState(s);
}

async function refreshAccess() {
  const s = dbxState();
  if (!s.refreshToken) throw new Error("Not connected");
  const body = new URLSearchParams({
    grant_type: "refresh_token", refresh_token: s.refreshToken, client_id: s.appKey
  });
  const r = await fetch("https://api.dropboxapi.com/oauth2/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body
  });
  if (!r.ok) throw new Error("Refresh failed");
  const tok = await r.json();
  s.accessToken = tok.access_token;
  s.expiresAt = Date.now() + (tok.expires_in - 60) * 1000;
  setDbxState(s);
}

async function getAccessToken() {
  const s = dbxState();
  if (!s.accessToken) return null;
  if (Date.now() >= (s.expiresAt || 0)) await refreshAccess();
  return dbxState().accessToken;
}

async function dbxDownload() {
  const tok = await getAccessToken();
  if (!tok) return null;
  const r = await fetch("https://content.dropboxapi.com/2/files/download", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + tok,
      "Dropbox-API-Arg": JSON.stringify({ path: "/album.json" })
    }
  });
  if (r.status === 409) return null; // not found
  if (!r.ok) {
    const text = await r.text().catch(() => "");
    console.error("Dropbox download error:", r.status, text);
    throw new Error("Download failed: " + r.status + " " + text.slice(0, 200));
  }
  const text = await r.text();
  if (!text) return null;
  try { return JSON.parse(text); } catch { return null; }
}

async function dbxUpload(data) {
  const tok = await getAccessToken();
  if (!tok) return;
  const r = await fetch("https://content.dropboxapi.com/2/files/upload", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + tok,
      "Dropbox-API-Arg": JSON.stringify({ path: "/album.json", mode: "overwrite", autorename: false, mute: true }),
      "Content-Type": "application/octet-stream"
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) {
    const text = await r.text().catch(() => "");
    console.error("Dropbox upload error:", r.status, text);
    throw new Error("Upload failed: " + r.status + " " + text.slice(0, 200));
  }
}

// ---------------- Sync ----------------
let syncTimer = null;
function scheduleSync() {
  if (!dbxState().refreshToken) return;
  setSyncStatus("pending", "pending");
  clearTimeout(syncTimer);
  syncTimer = setTimeout(doSync, 1500);
}

async function doSync() {
  if (!dbxState().refreshToken) { setSyncStatus("offline", "offline"); return; }
  try {
    setSyncStatus("syncing", "syncing");
    const remote = await dbxDownload();
    if (remote && remote.lastUpdated > state.lastUpdated) {
      state = Object.assign(defaultState(), remote);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      rerender();
    } else {
      await dbxUpload(state);
    }
    setSyncStatus("synced", "synced");
  } catch (e) {
    console.error(e);
    setSyncStatus("error", "syncErr");
    toast(e.message, true);
  }
}

function setSyncStatus(cls, textKey) {
  $("syncDot").className = "sync-dot " + cls;
  $("syncText").textContent = t(textKey);
  $("syncText").dataset.i18nKey = textKey;
}

function toast(msg, isError) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => t.className = "toast" + (isError ? " error" : ""), 2500);
}

// ---------------- Setup modal ----------------
function openSetup() {
  // Re-apply translations so the modal text is in the current language; this
  // also sets redirectUri's textContent since step6 includes that element.
  applyTranslations();
  $("redirectUri").textContent = DBX_REDIRECT;
  const connected = !!dbxState().refreshToken;
  const shared = !!SHARED_DBX_APP_KEY;
  $("setupForm").style.display = connected ? "none" : "block";
  $("connectedView").style.display = connected ? "block" : "none";
  $("setupStatus").textContent = connected ? t("connectedToDbx") : "";
  $("setupShared").style.display = shared ? "block" : "none";
  $("setupAdvanced").style.display = shared ? "none" : "block";
  $("setupModal").classList.add("open");
}
function closeSetup() { $("setupModal").classList.remove("open"); }

// ---------------- Init ----------------
async function handleOAuthRedirect() {
  const params = new URLSearchParams(location.search);
  const code = params.get("code");
  if (!code) return;
  history.replaceState({}, "", location.pathname);
  try {
    await exchangeCode(code);
    toast(t("dropboxConnectedToast"));
    await doSync();
  } catch (e) {
    toast(t("oauthFailed", e.message), true);
  }
}

function initListeners() {
  $("setupBtn").addEventListener("click", openSetup);
  $("closeSetup").addEventListener("click", closeSetup);
  $("closeSetup2").addEventListener("click", closeSetup);
  $("syncStatus").addEventListener("click", () => { if (dbxState().refreshToken) doSync(); else openSetup(); });
  $("menuBtn").addEventListener("click", () => $("sidebar").classList.toggle("open"));
  $("filter").addEventListener("input", renderSidebar);
  $("sortToggle").addEventListener("click", e => {
    const b = e.target.closest("button[data-sort]");
    if (!b) return;
    sortMode = b.dataset.sort;
    localStorage.setItem("panini.sort", sortMode);
    renderSidebar();
  });
  $("connectBtn").addEventListener("click", () => {
    const k = SHARED_DBX_APP_KEY || $("appKeyInput").value.trim();
    if (!k) { toast(t("enterAppKey"), true); return; }
    startDropboxOAuth(k);
  });
  $("syncNowBtn").addEventListener("click", () => { closeSetup(); doSync(); });
  $("disconnectBtn").addEventListener("click", () => {
    if (!confirm(t("disconnectConfirm"))) return;
    localStorage.removeItem(DBX_KEY);
    setSyncStatus("offline", "offline");
    closeSetup();
    toast(t("disconnectedToast"));
  });
  $("langBtn").addEventListener("click", () => setLang(lang === "en" ? "es" : "en"));
  $("exportBtn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "panini-2026-album.json";
    a.click();
  });
}

async function init() {
  initListeners();
  applyTranslations();
  rerender();
  if (location.search.includes("code=")) await handleOAuthRedirect();
  if (dbxState().refreshToken) {
    setSyncStatus("synced", "connectedStatus");
    doSync();
  } else {
    setSyncStatus("offline", "offline");
  }
}

init();
</script>
</body>
</html>
